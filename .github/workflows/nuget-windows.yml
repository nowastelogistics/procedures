name: NuGet build

on:
  workflow_call:
    inputs:
      project_file_path:
        required: true
        type: string
      project_test_file_path:
        required: false
        type: string
      project_nuget_name:
        required: true
        type: string
    secrets:
      nuget_github_server_url:
        required: true
      nuget_github_server_username:
        required: true
      nuget_github_server_password:
        required: true

jobs:
  build:
    runs-on: windows-2022
    steps:
    - name: Checkout source
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
      with:
        versionSpec: '6.x'

    - name: Download GitVersion config (force real curl)
      run: |
        C:\Windows\System32\curl.exe -L https://raw.githubusercontent.com/nowastelogistics/procedures/master/GitVersionConfig.yml -o GitVersionConfig.yml

    - name: Determine Version
      id: gitversion
      uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
      with:
        configFilePath: GitVersionConfig.yml
        disableCache: true
        
    - name: Build custom version (Windows / cmd)
      shell: cmd
      run: |
        @echo off
        setlocal enabledelayedexpansion

        rem === Extract GitVersion outputs ===
        set major=${{ steps.gitversion.outputs.major }}
        set minor=${{ steps.gitversion.outputs.minor }}
        set patch=${{ steps.gitversion.outputs.patch }}
        set label=${{ steps.gitversion.outputs.preReleaseLabel }}
        set number=${{ steps.gitversion.outputs.preReleaseNumber }}
        if "%number%"=="" set number=${{ steps.gitversion.outputs.commitsSinceVersionSource }}

        rem === If label is empty and we are on a release/* branch, force rc ===
        set branch=%GITHUB_REF_NAME%
        echo Branch is %branch%
        echo Label before check: %label%
        echo Number before check: %number%
        echo.
        echo.

        rem === Zero-pad to 5 digits ===
        set padded=00000%number%
        set padded=%padded:~-5%

        rem === Build version string ===
        if "%label%"=="" (
          set version=%major%.%minor%.%patch%
        ) else (
          set version=%major%.%minor%.%patch%-%label%%padded%
        )

        echo Computed version: %version%

        rem === Export to GITHUB_ENV ===
        echo GITVERSION=%version%>> %GITHUB_ENV%

    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: '10.x'

    - name: Prepare NuGet sources
      run: |
        dotnet nuget add source --username ${{ secrets.nuget_github_server_username }} --password ${{ secrets.nuget_github_server_password }} --store-password-in-clear-text --name github ${{ secrets.nuget_github_server_url }}

    - name: Run tests
      id: test
      shell: bash
      run: |
        if [ -n "${{ inputs.project_test_file_path }}" ]; then
          echo "tests-exists=true" >> $GITHUB_OUTPUT
          dotnet test ${{ inputs.project_test_file_path }} --results-directory ./TestResults --logger "trx;LogFileName=test-results.trx"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload test results
      if: (success() || failure()) && steps.test.outputs.tests-exists == 'true'
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
      with:
        name: Tests
        working-directory: ${{ github.workspace }}/TestResults
        path: '*.trx'
        reporter: dotnet-trx
        max-annotations: '50'
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Code Coverage Summary Report
      uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
      id: codecoveragereport
      if: hashFiles('TestResults/*.xml') != ''
      with:
        filename: TestResults/coverage.cobertura.xml
        badge: true
        format: 'markdown'
        output: 'both'

    - name: Add Coverage PR Comment
      if: steps.codecoveragereport.outcome == 'success' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        marker='<!-- code-coverage-summary -->'
        comment_body="$(printf '%s\n\n' "$marker"; cat code-coverage-results.md)"
        comment_id="$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" --paginate --jq ".[] | select(.body | contains(\"$marker\")) | .id" | head -n 1)"

        if [ -n "$comment_id" ]; then
          gh api "repos/${{ github.repository }}/issues/comments/$comment_id" -X PATCH -f body="$comment_body"
        else
          gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" -f body="$comment_body"
        fi

    - name: Build & Pack NuGet
      shell: bash
      run: |
        dotnet build ${{ inputs.project_file_path }} -p:Version=${{ env.GITVERSION }} --configuration Release
        dotnet pack ${{ inputs.project_file_path }} -p:Version=${{ env.GITVERSION }} --configuration Release --output nupkgs

    - name: Create NuGet release
      if: startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release')
      shell: bash
      run: |
        dotnet nuget push nupkgs/${{ inputs.project_nuget_name }}.${{ env.GITVERSION }}.nupkg --api-key ${{ secrets.nuget_github_server_password }} --source github --skip-duplicate

        echo '### NuGet package' >> $GITHUB_STEP_SUMMARY
        echo 'Pushed new release of package **${{ inputs.project_nuget_name }}** version **${{ env.GITVERSION }}** to feed' >> $GITHUB_STEP_SUMMARY
