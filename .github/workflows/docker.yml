name: Docker build

on:
  workflow_call:
    inputs:
      docker_file_path:
        required: true
        type: string
      docker_image_name:
        required: true
        type: string
      docker_has_tests:
        required: false
        type: boolean
        default: false
      docker_has_code_coverage:
        required: false
        type: boolean
        default: false
      octo_auto_release_dev:
        required: false
        type: boolean
        default: false
      octo_auto_release_prod:
        required: false
        type: boolean
        default: false
    secrets:
      docker_server_url:
        required: true
      docker_server_username:
        required: true
      docker_server_password:
        required: true
      nuget_github_server_url:
        required: true
      nuget_github_server_username:
        required: true
      nuget_github_server_password:
        required: true
      octopus_server_url:
        required: true
      octopus_server_apikey:
        required: true


jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      gitversion: ${{ steps.version.outputs.gitversion }}
      image_digest: ${{ steps.publish.outputs.digest }}
    permissions:
      contents: write
      checks: write
      packages: write
      pull-requests: write

    steps:
    - name: Checkout source
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
      with:
        versionSpec: '6.x'

    - name: Download GitVersion config
      run: curl -L https://raw.githubusercontent.com/nowastelogistics/procedures/master/GitVersionConfig.yml -o GitVersionConfig.yml
      
    - name: Show config with line numbers
      run: |
        nl -ba GitVersionConfig.yml | sed -n '1,120p'

    - name: Determine Version
      id: gitversion
      uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
      with:
        useConfigFile: true
        configFilePath: GitVersionConfig.yml
        additionalArguments: '/diag /nocache' 
        
    - run: |
        echo "SemVer=${{ steps.gitversion.outputs.semVer }}"
        echo "SemVerFull=${{ steps.gitversion.outputs.fullSemVer }}"
        echo "SemVer=${{ steps.gitversion.outputs.semVer }}"
        echo "SemVerFull=${{ steps.gitversion.outputs.fullSemVer }}"
        echo "PreReleaseTag=${{ steps.gitversion.outputs.preReleaseTag }}"
        echo "PreReleaseLabel=${{ steps.gitversion.outputs.preReleaseLabel }}"
        echo "PreReleaseNumber=${{ steps.gitversion.outputs.preReleaseNumber }}"
        echo "CommitsSinceVersionSource=${{ steps.gitversion.outputs.commitsSinceVersionSource }}"
        echo "GitBranchName=${{ steps.gitversion.outputs.branchName }}"
        
    # Custom version format to match Docker / NuGet requirements. nuGetVersionV2 was removed from GitVersion v6
    - name: Build custom version
      id: version
      run: |
        major='${{ steps.gitversion.outputs.major }}'
        minor='${{ steps.gitversion.outputs.minor }}'
        patch='${{ steps.gitversion.outputs.patch }}'
        label='${{ steps.gitversion.outputs.preReleaseLabel }}'
        number='${{ steps.gitversion.outputs.commitsSinceVersionSource }}'

        # zero-pad number to 5 digits (NuGet style)
        padded=$(printf "%05d" "${number:-0}")

        if [ -z "$label" ]; then
          version="${major}.${minor}.${patch}"
        else
          version="${major}.${minor}.${patch}-${label}${padded}"
        fi

        echo "GITVERSION=$version" >> "$GITHUB_ENV"
        echo "gitversion=$version" >> "$GITHUB_OUTPUT"
        echo "Computed version: $version"

    - name: Cache Docker layers
      id: docker-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: /tmp/.docker-cache
        key: ${{ runner.os }}-docker-${{ hashFiles(inputs.docker_file_path) }}
        restore-keys: ${{ runner.os }}-docker

    - name: Setup buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      id: buildx
      with:
        install: true

    - name: Build & Test Docker
      run: >-
            docker buildx build
            --builder ${{ steps.buildx.outputs.name }}
            --build-arg NUGET_GITHUB_SERVER_URL=${{ secrets.nuget_github_server_url }}
            --build-arg NUGET_GITHUB_SERVER_USERNAME=${{ secrets.nuget_github_server_username }}
            --build-arg NUGET_GITHUB_SERVER_PASSWORD=${{ secrets.nuget_github_server_password }}
            --build-arg GITVERSION=${{ env.GITVERSION }}
            --load
            --file ${{ inputs.docker_file_path }}
            --cache-from type=local,src=/tmp/.docker-cache
            --cache-to type=local,dest=/tmp/.docker-cache,mode=max
            --tag ${{ secrets.docker_server_url }}/${{ secrets.docker_server_username }}/${{ inputs.docker_image_name }}:${{ env.GITVERSION }} .

    - name: Extract test results
      if: inputs.docker_has_tests == true
      run: |
            docker create -ti --name dummy ${{ secrets.docker_server_url }}/${{ secrets.docker_server_username }}/${{ inputs.docker_image_name }}:${{ env.GITVERSION }} bash
            docker cp dummy:/TestResults/. ./TestResults

            if [[ ${{ inputs.docker_has_code_coverage }} == true ]]; then
              cp TestResults/*/coverage.cobertura.xml TestResults/coverage.cobertura.xml
            fi

    - name: Upload test results
      if: (success() || failure()) && hashFiles('TestResults/*.trx') != ''
      uses: dorny/test-reporter@a6ddd83ac95ff4586f5d3aceeb314d9a1841db95 # v3.0.0
      with:
        name: Tests
        working-directory: ${{ github.workspace }}/TestResults
        path: '*.trx'
        reporter: dotnet-trx
        max-annotations: '50'
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Coverage summary
      id: coverage
      if: inputs.docker_has_code_coverage == true && hashFiles('TestResults/*.xml') != ''
      uses: insightsengineering/coverage-action@f3f8cdb7a8863fb60236982ac44b9ae63c768cd4 # v3
      with:
        path: TestResults/coverage.cobertura.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        publish: true
        fail: false
        exclude-detailed-coverage: true
        togglable-report: true
        diff: false

    - name: Write coverage markdown
      if: inputs.docker_has_code_coverage == true && steps.coverage.outcome == 'success'
      run: |
        printf "%s\n" "${{ steps.coverage.outputs.summary }}" > code-coverage-results.md
        wc -c code-coverage-results.md
        sed -n '1,40p' code-coverage-results.md

    - name: Get Pull Request information
      uses: 8BitJonny/gh-get-current-pr@08e737c57a3a4eb24cec6487664b243b77eb5e36 # 3.0.0
      if: inputs.docker_has_code_coverage == true && steps.coverage.outcome == 'success'
      id: pr
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        sha: ${{ github.event.pull_request.head.sha }}
        filterOutClosed: true

    - name: Add Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
      if: inputs.docker_has_code_coverage == true && steps.pr.outputs.number != ''
      with:
        number: ${{ steps.pr.outputs.number }}
        recreate: true
        path: code-coverage-results.md

    - name: Docker Login
      if: startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release') || github.ref == 'refs/heads/develop'
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ secrets.docker_server_url }}
        username: ${{ secrets.docker_server_username }}
        password: ${{ secrets.docker_server_password }}

    - name: Compute publish tags
      if: startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release') || github.ref == 'refs/heads/develop'
      id: image
      run: |
          image_repo="${{ secrets.docker_server_url }}/${{ secrets.docker_server_username }}/${{ inputs.docker_image_name }}"
          echo "repo=$image_repo" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "$image_repo:${{ env.GITVERSION }}"
            if [[ $GITHUB_REF == refs/tags/* ]]; then
              echo "$image_repo:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

    - name: Publish Docker image
      if: startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release') || github.ref == 'refs/heads/develop'
      id: publish
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        builder: ${{ steps.buildx.outputs.name }}
        context: .
        file: ${{ inputs.docker_file_path }}
        push: true
        build-args: |
          NUGET_GITHUB_SERVER_URL=${{ secrets.nuget_github_server_url }}
          NUGET_GITHUB_SERVER_USERNAME=${{ secrets.nuget_github_server_username }}
          NUGET_GITHUB_SERVER_PASSWORD=${{ secrets.nuget_github_server_password }}
          GITVERSION=${{ env.GITVERSION }}
        cache-from: type=local,src=/tmp/.docker-cache
        cache-to: type=local,dest=/tmp/.docker-cache,mode=max
        tags: ${{ steps.image.outputs.tags }}

  sign:
    runs-on: ubuntu-24.04
    needs: build
    if: needs.build.outputs.image_digest != ''
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
    - name: Docker Login
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ secrets.docker_server_url }}
        username: ${{ secrets.docker_server_username }}
        password: ${{ secrets.docker_server_password }}

    - name: Install cosign
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      with:
        cosign-release: v3.0.6

    - name: Sign published image
      env:
        IMAGE_REF: ${{ secrets.docker_server_url }}/${{ secrets.docker_server_username }}/${{ inputs.docker_image_name }}@${{ needs.build.outputs.image_digest }}
      run: |
        cosign sign --yes "$IMAGE_REF"

    - name: Install Octopus CLI
      uses: OctopusDeploy/install-octopus-cli-action@53672953fdc83eef118faf7ac9f15638424bdd3f # v4.1.0
      with:
        version: 2.21.0

    - name: Determine Octopus release branch
      id: octopus-channel
      run: |
          echo "autorelease=false" >> $GITHUB_OUTPUT

          if [[ $GITHUB_REF == 'refs/tags/'* ]]; then
            echo "channel=Production" >> $GITHUB_OUTPUT
            echo "notes=https://github.com/$GITHUB_REPOSITORY/releases/tag/$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

            if [[ ${{ inputs.octo_auto_release_prod }} == true ]]; then
              echo "autorelease=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "channel=Development" >> $GITHUB_OUTPUT
            echo "notes=https://github.com/$GITHUB_REPOSITORY/commit/$GITHUB_SHA" >> $GITHUB_OUTPUT

            if [[ ${{ inputs.octo_auto_release_dev }} == true ]] && [[ $GITHUB_REF_NAME == "refs/heads/release"* ]]; then
              echo "autorelease=true" >> $GITHUB_OUTPUT
            fi
          fi

    - name: Octopus Create release
      env:
        IMAGE_DIGEST: ${{ needs.build.outputs.image_digest }}
        GITVERSION: ${{ needs.build.outputs.gitversion }}
      run: |
          octopus login --server "${{ secrets.octopus_server_url }}" --api-key "${{ secrets.octopus_server_apikey }}"
          octopus package zip create --id "${{ inputs.docker_image_name }}" --version "${GITVERSION}" --base-path "nomad" --include "${{ inputs.docker_image_name }}.*"
          octopus package upload --space "Spaces-1" --package "${{ inputs.docker_image_name }}.${GITVERSION}.zip"
          octopus release create --space "Spaces-1" --project "${{ inputs.docker_image_name }}" --version "${GITVERSION}" --channel "${{ steps.octopus-channel.outputs.channel }}" --releaseNotes "${{ steps.octopus-channel.outputs.notes }}" --package "${{ inputs.docker_image_name }}:${GITVERSION}" --custom-field "ImageDigest:${IMAGE_DIGEST}"

          if ${{ steps.octopus-channel.outputs.autorelease }}; then
            octopus deploy-release --project "${{ inputs.docker_image_name }}" --version "${GITVERSION}" --tenant "*" --deployTo "${{ steps.octopus-channel.outputs.channel }}"
          fi

          echo '### Octopus release' >> $GITHUB_STEP_SUMMARY
          echo 'Pushed signed release of docker container **${{ inputs.docker_image_name }}** version **'"${GITVERSION}"'** to Octopus' >> $GITHUB_STEP_SUMMARY
